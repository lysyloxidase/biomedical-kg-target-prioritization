services:
  neo4j:
    image: neo4j:5
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ../neo4j/data:/data
      - ../neo4j/logs:/logs
      - ../neo4j/import:/import
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  kgtp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      KGTP_NEO4J__URI: ${KGTP_NEO4J__URI:-bolt://neo4j:7687}
      KGTP_NEO4J__USER: ${NEO4J_USER:-neo4j}
      KGTP_NEO4J__PASSWORD: ${NEO4J_PASSWORD:-}
      KGTP_DEMO_MODE: ${KGTP_DEMO_MODE:-false}
    volumes:
      - ../artifacts:/app/artifacts:ro
